<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميديكال فور يو | لوحة التحكم - بنك الدم</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --main-blue: #004494; --main-red: #d32f2f; --light-bg: #f4f7f6; --card-bg: #ffffff; --text-main: #333333; --text-muted: #888888; --success-color: #27ae60; --warning-color: #f39c12; --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        body.dark-mode { --light-bg: #121212; --card-bg: #1e1e1e; --text-main: #f4f7f6; --text-muted: #aaaaaa; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        html, body { overflow-x: hidden; width: 100%; min-height: 100vh; background-color: var(--light-bg); color: var(--text-main); }
        
        /* Overlay Auth */
        #adminLoginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--light-bg); z-index: 9999999; display: flex; justify-content: center; align-items: center; padding: 20px; transition: opacity 0.5s ease; }
        .admin-auth-card { background: var(--card-bg); width: 100%; max-width: 450px; padding: 40px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); border-top: 8px solid var(--main-red); text-align: center; }
        body.dark-mode .admin-auth-card { border-color: #333; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .admin-auth-card h2 { color: var(--main-red); margin-bottom: 20px; font-weight: 900; }
        
        .floating-group { position: relative; margin-bottom: 20px; text-align: right; }
        .floating-group input, .floating-group select, .floating-group textarea { width: 100%; padding: 15px; border: 2px solid var(--light-bg); border-radius: 10px; background: transparent; font-size: 1rem; color: var(--text-main); font-family: 'Cairo'; outline: none; }
        body.dark-mode .floating-group input, body.dark-mode .floating-group select, body.dark-mode .floating-group textarea { border-color: #333; }
        .floating-group input:focus, .floating-group select:focus, .floating-group textarea:focus { border-color: var(--main-red); background: var(--card-bg); }
        .btn-submit { width: 100%; padding: 15px; border-radius: 50px; font-weight: 900; cursor: pointer; border: none; font-size: 1.2rem; background: linear-gradient(135deg, var(--main-red), #900000); color: white; margin-top: 10px; transition: 0.3s; }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(211, 47, 47, 0.4); }

        .admin-navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 3%; background: linear-gradient(135deg, #1e272e, #111); color: white; box-shadow: 0 4px 20px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--main-red); }
        .nav-actions { display: flex; gap: 10px; }
        .btn-action { background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 8px 15px; border-radius: 8px; font-weight: 900; transition: 0.3s; cursor: pointer; }
        .btn-action:hover { background: var(--main-red); border-color: var(--main-red); transform: translateY(-2px); }

        .dashboard-container { padding: 40px 3%; max-width: 1400px; margin: auto; }
        .section-selector { background: var(--card-bg); padding: 20px; border-radius: 15px; margin-bottom: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 20px; border: 1px solid var(--light-bg); }
        body.dark-mode .section-selector { border-color: #333; }
        .section-selector select { padding: 12px 20px; font-size: 1.1rem; border-radius: 10px; border: 2px solid var(--main-red); font-family: 'Cairo'; font-weight: bold; background: var(--light-bg); color: var(--text-main); flex-grow: 1; outline: none; }

        .form-card { background: var(--card-bg); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid var(--light-bg); border-top: 5px solid var(--main-red); margin-bottom: 40px; }
        body.dark-mode .form-card { border-color: #333; border-top-color: var(--main-red); }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: 1 / -1; }
        @media(max-width: 768px){ .form-grid { grid-template-columns: 1fr; } }

        .table-wrapper { background: var(--card-bg); border-radius: 20px; padding: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); border: 1px solid var(--light-bg); overflow-x: auto; }
        body.dark-mode .table-wrapper { border-color: #333; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        thead { background: rgba(211, 47, 47, 0.1); }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid var(--light-bg); }
        body.dark-mode th, body.dark-mode td { border-bottom-color: #333; }
        th { color: var(--main-red); font-weight: 900; }
        
        .action-btns { display: flex; gap: 10px; }
        .btn-edit, .btn-reject { width: 35px; height: 35px; border-radius: 8px; border: none; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; font-size: 1.1rem; }
        .btn-edit { background: var(--main-blue); } .btn-edit:hover { transform: scale(1.1); }
        .btn-reject { background: var(--main-red); } .btn-reject:hover { transform: scale(1.1); }

        .toast-container { position: fixed; bottom: 30px; left: 30px; z-index: 999999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background: var(--card-bg); color: var(--text-main); border-right: 5px solid var(--success-color); padding: 15px 25px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 15px; font-weight: bold; animation: slideUpToast 0.5s ease-out forwards; border: 1px solid var(--light-bg); }
        body.dark-mode .toast { border-color: #333; }
        .toast.error { border-right-color: var(--main-red); }
        @keyframes slideUpToast { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .dynamic-section { display: none; }
        .dynamic-section.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAtGcjtKZG2raucvyDAdcDWeUbAgKvQZ5w",
            authDomain: "medical-for-you-6.firebaseapp.com",
            projectId: "medical-for-you-6",
            storageBucket: "medical-for-you-6.firebasestorage.app",
            messagingSenderId: "572890832303",
            appId: "1:572890832303:web:09e920543adf3eb5ea635a"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.db = db; window.collection = collection; window.addDoc = addDoc; window.doc = doc; window.updateDoc = updateDoc; window.deleteDoc = deleteDoc; window.onSnapshot = onSnapshot; window.serverTimestamp = serverTimestamp;
    </script>
</head>
<body>

    <div id="adminLoginOverlay">
        <div class="admin-auth-card">
            <h2><i class="fas fa-database"></i> إدارة بنك الدم</h2>
            <p style="color: var(--text-muted); margin-bottom: 25px;">مخصصة لمدراء المكاتب لتحديث سجلات بنك الدم</p>
            <form onsubmit="verifyAdminLogin(event)">
                <div class="floating-group">
                    <select id="adminRoleSelect" required>
                        <option value="CEO">الرئيس التنفيذي (CEO)</option>
                        <option value="مكتب_شؤون_العضوية">مكتب شؤون العضوية</option>
                        <option value="المكتب_الاعلامي">المكتب الإعلامي</option>
                    </select>
                </div>
                <div class="floating-group">
                    <input type="password" id="adminPassInput" required placeholder="كلمة المرور المشفرة">
                </div>
                <button type="submit" class="btn-submit">تأكيد الدخول <i class="fas fa-lock"></i></button>
            </form>
        </div>
    </div>

    <nav class="admin-navbar">
        <div class="logo"><i class="fas fa-droplet"></i> لوحة تحكم بنك الدم</div>
        <div class="nav-actions">
            <span id="navRoleDisplay" style="font-weight: bold;"></span>
            <button class="btn-action" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
            <button class="btn-action" style="background: var(--main-red); border-color: var(--main-red);" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </nav>

    <div class="dashboard-container">
        
        <div class="section-selector">
            <label style="font-weight: bold; color: var(--main-red);"><i class="fas fa-filter"></i> القسم المراد تحديثه:</label>
            <select id="sectionSelector" onchange="switchSection()">
                <option value="sec_blood">سجلات المتبرعين والمرضى</option>
                <option value="sec_toasts">الإشعارات الذكية (Toasts)</option>
            </select>
        </div>

        <!-- 1. قسم بنك الدم -->
        <div id="sec_blood" class="dynamic-section active">
            <div class="form-card">
                <h3 style="color: var(--main-red); margin-bottom: 20px;">إضافة متبرع / مريض يدوياً</h3>
                <form onsubmit="saveBloodRecord(event)">
                    <input type="hidden" id="bId">
                    <div class="form-grid">
                        <div class="floating-group">
                            <select id="bStatus" required onchange="document.getElementById('bottlesContainer').style.display = this.value === 'urgent' ? 'block' : 'none';">
                                <option value="available">متبرع متاح</option>
                                <option value="urgent">مريض يحتاج عاجل</option>
                            </select>
                        </div>
                        <div class="floating-group" id="bottlesContainer" style="display: none;">
                            <input type="number" id="bBottles" placeholder="عدد الزجاجات المطلوبة (مثال: 2)">
                        </div>
                        <div class="floating-group full-width">
                            <input type="text" id="bName" required placeholder="الاسم الرباعي">
                        </div>
                        <div class="floating-group">
                            <select id="bBloodGroup" required>
                                <option value="O+">O+</option><option value="O-">O-</option>
                                <option value="A+">A+</option><option value="A-">A-</option>
                                <option value="B+">B+</option><option value="B-">B-</option>
                                <option value="AB+">AB+</option><option value="AB-">AB-</option>
                            </select>
                        </div>
                        <div class="floating-group">
                            <input type="text" id="bPhone" required placeholder="رقم الهاتف">
                        </div>
                        <div class="floating-group full-width">
                            <input type="text" id="bLocation" required placeholder="المدينة واسم المستشفى">
                        </div>
                    </div>
                    <button type="submit" class="btn-submit" style="width: auto; padding: 10px 30px;">حفظ السجل <i class="fas fa-save"></i></button>
                </form>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>الحالة</th><th>الاسم</th><th>الفصيلة</th><th>الهاتف</th><th style="width: 100px;">إجراءات</th></tr></thead>
                    <tbody id="bloodTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- 2. قسم الإشعارات الذكية -->
        <div id="sec_toasts" class="dynamic-section">
            <div class="form-card">
                <h3 style="color: var(--main-red); margin-bottom: 20px;">إضافة إشعار ذكي لشاشة بنك الدم (Toasts)</h3>
                <form onsubmit="saveToast(event)">
                    <input type="hidden" id="toastId">
                    <div class="form-grid">
                        <div class="floating-group full-width">
                            <input type="text" id="toastText" required placeholder="نص الإشعار (مثال: نداء عاجل لفصيلة O-)">
                        </div>
                        <div class="floating-group">
                            <label style="position:static; display:block; margin-bottom:5px;">وقت التأخير قبل الظهور (بالثواني)</label>
                            <input type="number" id="toastDelay" required placeholder="مثال: 2">
                        </div>
                        <div class="floating-group">
                            <label style="position:static; display:block; margin-bottom:5px;">مدة البقاء قبل الاختفاء (بالثواني)</label>
                            <input type="number" id="toastDuration" required placeholder="مثال: 5">
                        </div>
                    </div>
                    <button type="submit" class="btn-submit" style="width: auto; padding: 10px 30px;">حفظ الإشعار <i class="fas fa-save"></i></button>
                </form>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>نص الإشعار</th><th>زمن التأخير</th><th>مدة العرض</th><th style="width: 100px;">إجراءات</th></tr></thead>
                    <tbody id="toastsTableBody"></tbody>
                </table>
            </div>
        </div>

    </div>

    <div id="toast-container" class="toast-container"></div>

    <script>
        const officePasswords = { "CEO": "096020", "مكتب_شؤون_العضوية": "mem123", "المكتب_الاعلامي": "media123" };
        let unsubBlood, unsubToast;

        window.toggleTheme = function() { document.body.classList.toggle('dark-mode'); };
        window.showToast = function(msg, type='success') {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div'); t.className = `toast ${type}`;
            t.innerHTML = `<i class="fas ${type=='success'?'fa-check-circle':'fa-exclamation-circle'}"></i><span>${msg}</span>`;
            container.appendChild(t); setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),500); }, 3000);
        };

        window.verifyAdminLogin = function(e) {
            e.preventDefault();
            const role = document.getElementById('adminRoleSelect').value;
            const pass = document.getElementById('adminPassInput').value;
            if (officePasswords[role] === pass) {
                document.getElementById('adminLoginOverlay').style.opacity = '0';
                setTimeout(() => document.getElementById('adminLoginOverlay').style.display = 'none', 500);
                document.getElementById('navRoleDisplay').innerText = role;
                window.showToast("تم الدخول بنجاح.");
                loadAllData();
            } else {
                window.showToast("كلمة المرور غير صحيحة", "error");
            }
        };

        window.switchSection = function() {
            document.querySelectorAll('.dynamic-section').forEach(sec => sec.classList.remove('active'));
            document.getElementById(document.getElementById('sectionSelector').value).classList.add('active');
        };

        function loadAllData() {
            // جلب سجلات بنك الدم
            if(unsubBlood) unsubBlood();
            unsubBlood = window.onSnapshot(window.collection(window.db, "blood_bank"), snap => {
                let html = '';
                snap.forEach(d => {
                    const dt = d.data();
                    const n = dt.name.replace(/'/g, "\\'"); const loc = dt.location.replace(/'/g, "\\'");
                    const ph = dt.phone.replace(/'/g, "\\'"); const bg = dt.bloodGroup;
                    const st = dt.status; const bot = dt.bottles || '';
                    
                    const statusText = st === 'urgent' ? '<span style="color:#e74c3c; font-weight:bold;">مريض</span>' : '<span style="color:#27ae60; font-weight:bold;">متبرع</span>';
                    
                    html += `<tr>
                    <td>${statusText}</td><td>${dt.name}</td><td>${dt.bloodGroup}</td><td style="direction:ltr;">${dt.phone}</td>
                    <td>
                        <div class="action-btns">
                            <button type="button" class="btn-edit" onclick="window.editBlood('${d.id}', '${n}', '${bg}', '${ph}', '${loc}', '${st}', '${bot}')"><i class="fas fa-pen"></i></button>
                            <button type="button" class="btn-reject" onclick="window.delDoc('blood_bank', '${d.id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </td></tr>`;
                });
                document.getElementById('bloodTableBody').innerHTML = html;
            });

            // جلب الإشعارات الذكية
            if(unsubToast) unsubToast();
            unsubToast = window.onSnapshot(window.collection(window.db, "blood_toasts"), snap => {
                let html = '';
                snap.forEach(d => {
                    const dt = d.data();
                    const text = dt.text.replace(/'/g, "\\'");
                    html += `<tr><td>${dt.text}</td><td>${dt.delay} ث</td><td>${dt.duration} ث</td>
                    <td>
                        <div class="action-btns">
                            <button type="button" class="btn-edit" onclick="window.editToast('${d.id}', '${text}', ${dt.delay}, ${dt.duration})"><i class="fas fa-pen"></i></button>
                            <button type="button" class="btn-reject" onclick="window.delDoc('blood_toasts', '${d.id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </td></tr>`;
                });
                document.getElementById('toastsTableBody').innerHTML = html;
            });
        }

        window.delDoc = async function(col, id) {
            if(confirm("تأكيد الحذف؟")){
                await window.deleteDoc(window.doc(window.db, col, id));
                window.showToast("تم الحذف بنجاح");
            }
        };

        // --- Blood Bank CRUD ---
        window.saveBloodRecord = async function(e) {
            e.preventDefault();
            const id = document.getElementById('bId').value;
            const status = document.getElementById('bStatus').value;
            const data = { 
                name: document.getElementById('bName').value,
                bloodGroup: document.getElementById('bBloodGroup').value,
                phone: document.getElementById('bPhone').value,
                location: document.getElementById('bLocation').value,
                status: status,
                bottles: status === 'urgent' ? document.getElementById('bBottles').value : '',
                timeNote: status === 'urgent' ? 'يحتاج تبرع عاجل' : 'متاح للاتصال',
            };
            if(id) { await window.updateDoc(window.doc(window.db, "blood_bank", id), data); window.showToast("تم التعديل"); } 
            else { data.timestamp = window.serverTimestamp(); await window.addDoc(window.collection(window.db, "blood_bank"), data); window.showToast("تمت الإضافة"); }
            e.target.reset(); document.getElementById('bId').value = '';
            document.getElementById('bottlesContainer').style.display = 'none';
        };
        window.editBlood = function(id, n, bg, ph, loc, st, bot) { 
            document.getElementById('bId').value=id; document.getElementById('bName').value=n; 
            document.getElementById('bBloodGroup').value=bg; document.getElementById('bPhone').value=ph; 
            document.getElementById('bLocation').value=loc; document.getElementById('bStatus').value=st; 
            document.getElementById('bBottles').value=bot;
            document.getElementById('bottlesContainer').style.display = st === 'urgent' ? 'block' : 'none';
        };

        // --- Toasts CRUD ---
        window.saveToast = async function(e) {
            e.preventDefault();
            const id = document.getElementById('toastId').value;
            const data = { text: document.getElementById('toastText').value, delay: Number(document.getElementById('toastDelay').value), duration: Number(document.getElementById('toastDuration').value) };
            if(id) { await window.updateDoc(window.doc(window.db, "blood_toasts", id), data); window.showToast("تم التعديل"); } 
            else { data.ts = window.serverTimestamp(); await window.addDoc(window.collection(window.db, "blood_toasts"), data); window.showToast("تمت الإضافة"); }
            e.target.reset(); document.getElementById('toastId').value = '';
        };
        window.editToast = function(id, text, delay, duration) { 
            document.getElementById('toastId').value = id; document.getElementById('toastText').value = text; document.getElementById('toastDelay').value = delay; document.getElementById('toastDuration').value = duration; 
        };
    </script>
</body>
</html>
