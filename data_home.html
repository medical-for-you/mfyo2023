<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميديكال فور يو | إدخال بيانات الواجهة</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --main-blue: #004494; --main-red: #d32f2f; --light-bg: #f4f7f6; --card-bg: #ffffff; --text-main: #333333; --text-muted: #888888; --success-color: #27ae60; --warning-color: #f39c12; --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        body.dark-mode { --light-bg: #121212; --card-bg: #1e1e1e; --text-main: #f4f7f6; --text-muted: #aaaaaa; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        html, body { overflow-x: hidden; width: 100%; min-height: 100vh; background-color: var(--light-bg); color: var(--text-main); }
        
        /* Overlay Auth */
        #adminLoginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--light-bg); z-index: 9999999; display: flex; justify-content: center; align-items: center; padding: 20px; transition: opacity 0.5s ease; }
        .admin-auth-card { background: var(--card-bg); width: 100%; max-width: 450px; padding: 40px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); border-top: 8px solid #9b59b6; text-align: center; }
        body.dark-mode .admin-auth-card { border-color: #333; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .admin-auth-card h2 { color: #9b59b6; margin-bottom: 20px; font-weight: 900; }
        
        .floating-group { position: relative; margin-bottom: 20px; text-align: right; }
        .floating-group input, .floating-group select, .floating-group textarea { width: 100%; padding: 15px; border: 2px solid var(--light-bg); border-radius: 10px; background: transparent; font-size: 1rem; color: var(--text-main); font-family: 'Cairo'; outline: none; }
        body.dark-mode .floating-group input, body.dark-mode .floating-group select, body.dark-mode .floating-group textarea { border-color: #333; }
        .floating-group input:focus, .floating-group select:focus, .floating-group textarea:focus { border-color: #9b59b6; background: var(--card-bg); }
        .btn-submit { width: 100%; padding: 15px; border-radius: 50px; font-weight: 900; cursor: pointer; border: none; font-size: 1.2rem; background: linear-gradient(135deg, #9b59b6, #8e44ad); color: white; margin-top: 10px; transition: 0.3s; }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(155, 89, 182, 0.4); }

        .admin-navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 3%; background: linear-gradient(135deg, #2c3e50, #1a252f); color: white; box-shadow: 0 4px 20px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: 900; color: #9b59b6; }
        .nav-actions { display: flex; gap: 10px; }
        .btn-action { background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 8px 15px; border-radius: 8px; font-weight: 900; transition: 0.3s; cursor: pointer; }
        .btn-action:hover { background: var(--main-red); border-color: var(--main-red); transform: translateY(-2px); }

        .dashboard-container { padding: 40px 3%; max-width: 1400px; margin: auto; }
        .section-selector { background: var(--card-bg); padding: 20px; border-radius: 15px; margin-bottom: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 20px; border: 1px solid var(--light-bg); }
        body.dark-mode .section-selector { border-color: #333; }
        .section-selector select { padding: 12px 20px; font-size: 1.1rem; border-radius: 10px; border: 2px solid #9b59b6; font-family: 'Cairo'; font-weight: bold; background: var(--light-bg); color: var(--text-main); flex-grow: 1; outline: none; }

        .form-card { background: var(--card-bg); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid var(--light-bg); border-top: 5px solid #9b59b6; margin-bottom: 40px; }
        body.dark-mode .form-card { border-color: #333; border-top-color: #9b59b6; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: 1 / -1; }
        @media(max-width: 768px){ .form-grid { grid-template-columns: 1fr; } }

        .table-wrapper { background: var(--card-bg); border-radius: 20px; padding: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); border: 1px solid var(--light-bg); overflow-x: auto; }
        body.dark-mode .table-wrapper { border-color: #333; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        thead { background: rgba(155, 89, 182, 0.1); }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid var(--light-bg); }
        body.dark-mode th, body.dark-mode td { border-bottom-color: #333; }
        th { color: #9b59b6; font-weight: 900; }
        
        .action-btns { display: flex; gap: 10px; }
        .btn-edit, .btn-reject { width: 35px; height: 35px; border-radius: 8px; border: none; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; font-size: 1.1rem; }
        .btn-edit { background: var(--main-blue); } .btn-edit:hover { transform: scale(1.1); }
        .btn-reject { background: var(--main-red); } .btn-reject:hover { transform: scale(1.1); }

        .toast-container { position: fixed; bottom: 30px; left: 30px; z-index: 999999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background: var(--card-bg); color: var(--text-main); border-right: 5px solid var(--success-color); padding: 15px 25px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 15px; font-weight: bold; animation: slideUpToast 0.5s ease-out forwards; }
        body.dark-mode .toast { border-color: #333; }
        .toast.error { border-right-color: var(--main-red); }
        @keyframes slideUpToast { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        /* إخفاء الأقسام */
        .dynamic-section { display: none; }
        .dynamic-section.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, addDoc, serverTimestamp, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAtGcjtKZG2raucvyDAdcDWeUbAgKvQZ5w",
            authDomain: "medical-for-you-6.firebaseapp.com",
            projectId: "medical-for-you-6",
            storageBucket: "medical-for-you-6.firebasestorage.app",
            messagingSenderId: "572890832303",
            appId: "1:572890832303:web:09e920543adf3eb5ea635a"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.db = db; window.collection = collection; window.addDoc = addDoc; window.doc = doc; window.updateDoc = updateDoc; window.deleteDoc = deleteDoc; window.onSnapshot = onSnapshot; window.serverTimestamp = serverTimestamp; window.setDoc = setDoc; window.getDoc = getDoc;
    </script>
</head>
<body>

    <div id="adminLoginOverlay">
        <div class="admin-auth-card">
            <h2><i class="fas fa-database"></i> بوابة إدخال البيانات</h2>
            <p style="color: var(--text-muted); margin-bottom: 25px;">مخصصة لمدراء المكاتب لتحديث واجهة المنظمة</p>
            <form onsubmit="verifyAdminLogin(event)">
                <div class="floating-group">
                    <select id="adminRoleSelect" required>
                        <option value="CEO">الرئيس التنفيذي (CEO)</option>
                        <option value="مكتب_الامانة_العامة">مكتب الأمانة العامة</option>
                        <option value="المكتب_الاعلامي">المكتب الإعلامي</option>
                        <option value="المكتب_المالي">المكتب المالي</option>
                        <option value="مكتب_البرامج_والمشاريع">مكتب البرامج والمشاريع</option>
                    </select>
                </div>
                <div class="floating-group">
                    <input type="password" id="adminPassInput" required placeholder="كلمة المرور المشفرة">
                </div>
                <button type="submit" class="btn-submit">تأكيد الدخول <i class="fas fa-lock"></i></button>
            </form>
        </div>
    </div>

    <nav class="admin-navbar">
        <div class="logo"><i class="fas fa-database"></i> لوحة الإدخال</div>
        <div class="nav-actions">
            <span id="navRoleDisplay" style="font-weight: bold;"></span>
            <button class="btn-action" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
            <button class="btn-action" style="background: var(--main-red); border-color: var(--main-red);" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </nav>

    <div class="dashboard-container">
        
        <div class="section-selector">
            <label style="font-weight: bold; color: #9b59b6;"><i class="fas fa-filter"></i> اختر القسم لتعديله:</label>
            <select id="sectionSelector" onchange="switchSection()">
                <option value="sec_news">شريط الأخبار العاجلة</option>
                <option value="sec_stats">أرقام وإحصائيات المنظمة</option>
                <option value="sec_projects">أحدث المشاريع الطبية</option>
                <option value="sec_faqs">الأسئلة الشائعة</option>
            </select>
        </div>

        <div id="sec_news" class="dynamic-section active">
            <div class="form-card">
                <h3 style="color: #9b59b6; margin-bottom: 20px;">إضافة خبر عاجل جديد</h3>
                <form onsubmit="saveNews(event)">
                    <input type="hidden" id="newsId">
                    <div class="floating-group">
                        <input type="text" id="newsText" required placeholder="اكتب نص الخبر (مثال: تم إطلاق القافلة الطبية...)">
                    </div>
                    <button type="submit" class="btn-submit" style="width: auto; padding: 10px 30px;">حفظ الخبر <i class="fas fa-save"></i></button>
                </form>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>نص الخبر</th><th style="width: 150px;">إجراءات</th></tr></thead>
                    <tbody id="newsTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="sec_stats" class="dynamic-section">
            <div class="form-card">
                <h3 style="color: #9b59b6; margin-bottom: 20px;">تحديث أرقام الإحصائيات (تعديل مباشر)</h3>
                <form onsubmit="saveStats(event)">
                    <div class="form-grid">
                        <div class="floating-group">
                            <label style="position:static; display:block; margin-bottom:5px;">عدد الأعضاء</label>
                            <input type="text" id="statMembers" required placeholder="مثال: +2000 عضو">
                        </div>
                        <div class="floating-group">
                            <label style="position:static; display:block; margin-bottom:5px;">المشاريع المنفذة</label>
                            <input type="text" id="statProjects" required placeholder="مثال: +45 مشروع">
                        </div>
                        <div class="floating-group full-width">
                            <label style="position:static; display:block; margin-bottom:5px;">الدورات التدريبية</label>
                            <input type="text" id="statCourses" required placeholder="مثال: +120 دورة">
                        </div>
                    </div>
                    <button type="submit" class="btn-submit" style="width: auto; padding: 10px 30px;">تحديث الأرقام <i class="fas fa-sync"></i></button>
                </form>
            </div>
        </div>

        <div id="sec_projects" class="dynamic-section">
            <div class="form-card">
                <h3 style="color: #9b59b6; margin-bottom: 20px;">إضافة/تعديل مشروع طبي</h3>
                <form onsubmit="saveProject(event)">
                    <input type="hidden" id="projId">
                    <div class="form-grid">
                        <div class="floating-group full-width">
                            <input type="text" id="projTitle" required placeholder="عنوان المشروع">
                        </div>
                        <div class="floating-group full-width">
                            <input type="url" id="projImg" required placeholder="رابط صورة المشروع (URL)">
                        </div>
                        <div class="floating-group full-width">
                            <textarea id="projDesc1" rows="3" required placeholder="الفقرة الأولى للوصف"></textarea>
                        </div>
                        <div class="floating-group full-width">
                            <textarea id="projDesc2" rows="3" placeholder="الفقرة الثانية للوصف (اختياري)"></textarea>
                        </div>
                    </div>
                    <button type="submit" class="btn-submit" style="width: auto; padding: 10px 30px;">حفظ المشروع <i class="fas fa-save"></i></button>
                </form>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>صورة</th><th>العنوان</th><th>الوصف 1</th><th style="width: 100px;">إجراءات</th></tr></thead>
                    <tbody id="projectsTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="sec_faqs" class="dynamic-section">
            <div class="form-card">
                <h3 style="color: #9b59b6; margin-bottom: 20px;">إضافة سؤال شائع</h3>
                <form onsubmit="saveFaq(event)">
                    <input type="hidden" id="faqId">
                    <div class="form-grid">
                        <div class="floating-group full-width">
                            <input type="text" id="faqQ" required placeholder="السؤال">
                        </div>
                        <div class="floating-group full-width">
                            <textarea id="faqA" rows="3" required placeholder="الإجابة"></textarea>
                        </div>
                    </div>
                    <button type="submit" class="btn-submit" style="width: auto; padding: 10px 30px;">حفظ السؤال <i class="fas fa-save"></i></button>
                </form>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>السؤال</th><th>الإجابة</th><th style="width: 100px;">إجراءات</th></tr></thead>
                    <tbody id="faqsTableBody"></tbody>
                </table>
            </div>
        </div>

    </div>

    <div id="toast-container" class="toast-container"></div>

    <script>
        const officePasswords = { "CEO": "096020", "مكتب_الامانة_العامة": "sec123", "المكتب_الاعلامي": "media123", "المكتب_المالي": "fin123", "مكتب_البرامج_والمشاريع": "prog123" };
        let unsubNews, unsubProj, unsubFaq;

        window.toggleTheme = function() { document.body.classList.toggle('dark-mode'); };
        window.showToast = function(msg, type='success') {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div'); t.className = `toast ${type}`;
            t.innerHTML = `<i class="fas ${type=='success'?'fa-check-circle':'fa-exclamation-circle'}"></i><span>${msg}</span>`;
            container.appendChild(t); setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),500); }, 3000);
        };

        window.verifyAdminLogin = function(e) {
            e.preventDefault();
            const role = document.getElementById('adminRoleSelect').value;
            const pass = document.getElementById('adminPassInput').value;
            if (officePasswords[role] === pass) {
                document.getElementById('adminLoginOverlay').style.opacity = '0';
                setTimeout(() => document.getElementById('adminLoginOverlay').style.display = 'none', 500);
                document.getElementById('navRoleDisplay').innerText = role;
                window.showToast("تم الدخول بنجاح.");
                loadAllData();
            } else {
                window.showToast("كلمة المرور غير صحيحة", "error");
            }
        };

        window.switchSection = function() {
            document.querySelectorAll('.dynamic-section').forEach(sec => sec.classList.remove('active'));
            document.getElementById(document.getElementById('sectionSelector').value).classList.add('active');
        };

        function loadAllData() {
            // جلب الإحصائيات (مستند واحد)
            window.getDoc(window.doc(window.db, "home_stats", "main_stats")).then(d => {
                if(d.exists()){
                    document.getElementById('statMembers').value = d.data().members;
                    document.getElementById('statProjects').value = d.data().projects;
                    document.getElementById('statCourses').value = d.data().courses;
                }
            });

            // جلب الأخبار
            if(unsubNews) unsubNews();
            unsubNews = window.onSnapshot(window.collection(window.db, "home_news"), snap => {
                let html = '';
                snap.forEach(d => {
                    const text = d.data().text.replace(/'/g, "\\'");
                    html += `<tr><td>${d.data().text}</td>
                    <td>
                        <div class="action-btns">
                            <button type="button" class="btn-edit" onclick="window.editNews('${d.id}', '${text}')"><i class="fas fa-pen"></i></button>
                            <button type="button" class="btn-reject" onclick="window.delDoc('home_news', '${d.id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </td></tr>`;
                });
                document.getElementById('newsTableBody').innerHTML = html;
            });

            // جلب المشاريع
            if(unsubProj) unsubProj();
            unsubProj = window.onSnapshot(window.collection(window.db, "home_projects"), snap => {
                let html = '';
                snap.forEach(d => {
                    const dt = d.data();
                    const t = dt.title.replace(/'/g, "\\'"); const i = dt.img.replace(/'/g, "\\'"); const d1 = dt.desc1.replace(/'/g, "\\'"); const d2 = dt.desc2?dt.desc2.replace(/'/g, "\\'"):'';
                    html += `<tr>
                    <td><img src="${dt.img}" style="width:50px; height:50px; border-radius:8px; object-fit:cover;"></td>
                    <td>${dt.title}</td><td>${dt.desc1.substring(0,30)}...</td>
                    <td>
                        <div class="action-btns">
                            <button type="button" class="btn-edit" onclick="window.editProj('${d.id}', '${t}', '${i}', '${d1}', '${d2}')"><i class="fas fa-pen"></i></button>
                            <button type="button" class="btn-reject" onclick="window.delDoc('home_projects', '${d.id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </td></tr>`;
                });
                document.getElementById('projectsTableBody').innerHTML = html;
            });

            // جلب الأسئلة
            if(unsubFaq) unsubFaq();
            unsubFaq = window.onSnapshot(window.collection(window.db, "home_faqs"), snap => {
                let html = '';
                snap.forEach(d => {
                    const dt = d.data();
                    const q = dt.question.replace(/'/g, "\\'"); const a = dt.answer.replace(/'/g, "\\'");
                    html += `<tr><td>${dt.question}</td><td>${dt.answer.substring(0,30)}...</td>
                    <td>
                        <div class="action-btns">
                            <button type="button" class="btn-edit" onclick="window.editFaq('${d.id}', '${q}', '${a}')"><i class="fas fa-pen"></i></button>
                            <button type="button" class="btn-reject" onclick="window.delDoc('home_faqs', '${d.id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </td></tr>`;
                });
                document.getElementById('faqsTableBody').innerHTML = html;
            });
        }

        window.delDoc = async function(col, id) {
            if(confirm("تأكيد الحذف؟")){
                await window.deleteDoc(window.doc(window.db, col, id));
                window.showToast("تم الحذف بنجاح");
            }
        };

        // --- News CRUD ---
        window.saveNews = async function(e) {
            e.preventDefault();
            const id = document.getElementById('newsId').value;
            const text = document.getElementById('newsText').value;
            if(id) {
                await window.updateDoc(window.doc(window.db, "home_news", id), {text}); window.showToast("تم التعديل");
            } else {
                await window.addDoc(window.collection(window.db, "home_news"), {text, ts: window.serverTimestamp()}); window.showToast("تمت الإضافة");
            }
            e.target.reset(); document.getElementById('newsId').value = '';
        };
        window.editNews = function(id, text) { document.getElementById('newsId').value = id; document.getElementById('newsText').value = text; };

        // --- Stats CRUD ---
        window.saveStats = async function(e) {
            e.preventDefault();
            await window.setDoc(window.doc(window.db, "home_stats", "main_stats"), {
                members: document.getElementById('statMembers').value,
                projects: document.getElementById('statProjects').value,
                courses: document.getElementById('statCourses').value
            });
            window.showToast("تم تحديث الإحصائيات بالواجهة");
        };

        // --- Projects CRUD ---
        window.saveProject = async function(e) {
            e.preventDefault();
            const id = document.getElementById('projId').value;
            const data = { title: document.getElementById('projTitle').value, img: document.getElementById('projImg').value, desc1: document.getElementById('projDesc1').value, desc2: document.getElementById('projDesc2').value };
            if(id) {
                await window.updateDoc(window.doc(window.db, "home_projects", id), data); window.showToast("تم تعديل المشروع");
            } else {
                data.ts = window.serverTimestamp();
                await window.addDoc(window.collection(window.db, "home_projects"), data); window.showToast("تمت إضافة المشروع");
            }
            e.target.reset(); document.getElementById('projId').value = '';
        };
        window.editProj = function(id, t, i, d1, d2) { document.getElementById('projId').value = id; document.getElementById('projTitle').value = t; document.getElementById('projImg').value = i; document.getElementById('projDesc1').value = d1; document.getElementById('projDesc2').value = d2; };

        // --- FAQ CRUD ---
        window.saveFaq = async function(e) {
            e.preventDefault();
            const id = document.getElementById('faqId').value;
            const data = { question: document.getElementById('faqQ').value, answer: document.getElementById('faqA').value };
            if(id) {
                await window.updateDoc(window.doc(window.db, "home_faqs", id), data); window.showToast("تم تعديل السؤال");
            } else {
                data.ts = window.serverTimestamp();
                await window.addDoc(window.collection(window.db, "home_faqs"), data); window.showToast("تمت إضافة السؤال");
            }
            e.target.reset(); document.getElementById('faqId').value = '';
        };
        window.editFaq = function(id, q, a) { document.getElementById('faqId').value = id; document.getElementById('faqQ').value = q; document.getElementById('faqA').value = a; };
    </script>
</body>
</html>
